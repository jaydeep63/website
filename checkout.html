<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Pandey Furnitures</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="checkout-styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🏪 Pandey Furnitures</h1>
            </div>
            <div class="navbar-items">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#products" class="nav-link">Products</a>
                <button class="cart-btn" onclick="window.location.href='index.html'">
                    ← Back to Shopping
                </button>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <div class="container">
            <h2 class="page-title">Order Checkout</h2>

            <div class="checkout-wrapper">
                <!-- Order Summary -->
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-items" id="summary-items">
                        <!-- Items will be loaded here -->
                    </div>
                    <div class="summary-total">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">₹0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping:</span>
                            <span id="shipping">₹0.00</span>
                        </div>
                        <div class="summary-row special">
                            <span>Total:</span>
                            <span id="grand-total">₹0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Checkout Form -->
                <div class="checkout-form-section">
                    <form id="checkout-form" onsubmit="handleCheckout(event)">
                        <!-- Shipping Information -->
                        <fieldset>
                            <legend>📦 Shipping Information</legend>
                            <div class="form-group">
                                <label for="full-name">Full Name *</label>
                                <input
                                    type="text"
                                    id="full-name"
                                    name="full_name"
                                    placeholder="Enter your full name"
                                    required
                                >
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="email">Email *</label>
                                    <input
                                        type="email"
                                        id="email"
                                        name="email"
                                        placeholder="your@email.com"
                                        required
                                    >
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone Number *</label>
                                    <input
                                        type="tel"
                                        id="phone"
                                        name="phone"
                                        placeholder="+91-XXXXXXXXXX"
                                        required
                                    >
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="address">Address *</label>
                                <textarea
                                    id="address"
                                    name="address"
                                    placeholder="Enter your delivery address"
                                    rows="3"
                                    required
                                ></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input
                                        type="text"
                                        id="city"
                                        name="city"
                                        placeholder="Your city"
                                        required
                                    >
                                </div>
                                <div class="form-group">
                                    <label for="state">State *</label>
                                    <input
                                        type="text"
                                        id="state"
                                        name="state"
                                        placeholder="Your state"
                                        required
                                    >
                                </div>
                                <div class="form-group">
                                    <label for="postal-code">Postal Code *</label>
                                    <input
                                        type="text"
                                        id="postal-code"
                                        name="postal_code"
                                        placeholder="XXXXXX"
                                        required
                                    >
                                </div>
                            </div>
                        </fieldset>

                        <!-- Payment Method -->
                        <fieldset>
                            <legend>💳 Payment Method</legend>
                            <div class="payment-options">
                                <label class="payment-option">
                                    <input
                                        type="radio"
                                        name="payment_method"
                                        value="credit_card"
                                        checked
                                    >
                                    <span>Credit / Debit Card</span>
                                </label>
                                <label class="payment-option">
                                    <input
                                        type="radio"
                                        name="payment_method"
                                        value="upi"
                                    >
                                    <span>UPI</span>
                                </label>
                                <label class="payment-option">
                                    <input
                                        type="radio"
                                        name="payment_method"
                                        value="netbanking"
                                    >
                                    <span>Net Banking</span>
                                </label>
                                <label class="payment-option">
                                    <input
                                        type="radio"
                                        name="payment_method"
                                        value="wallet"
                                    >
                                    <span>Digital Wallet</span>
                                </label>
                            </div>
                        </fieldset>

                        <!-- Agree to Terms -->
                        <div class="form-group checkbox">
                            <input
                                type="checkbox"
                                id="terms"
                                name="terms"
                                required
                            >
                            <label for="terms">
                                I agree to the terms and conditions and privacy policy
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="submit-btn">
                            Proceed to Payment
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Pandey Furnitures. All rights reserved.</p>
            <p>Email: contact@pandeyfurnitures.in | Phone: +91-XXXXXXXXXX</p>
        </div>
    </footer>

    <script src="checkout.js"></script>
</body>
</html>
